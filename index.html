<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#070914" />
  <meta name="description" content="RAIN//LINE IKB — 池袋を舞台にしたiPhoneブラウザ対応のオープンワールド風ナイトランゲーム" />
  <title>RAIN//LINE IKB</title>
  <style>
    :root{color-scheme:dark;--pink:#ff3bd4;--cyan:#29f3ff;--amber:#ffd36e;--ink:#070914}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050711;color:white;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans",sans-serif;touch-action:none;user-select:none}
    #game{position:fixed;inset:0;width:100vw;height:100dvh;background:radial-gradient(circle at 50% 20%,#1b2440,#050711 70%)}
    .hud{position:fixed;inset:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);pointer-events:none;padding:14px;display:flex;flex-direction:column;justify-content:space-between;gap:10px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.card{min-width:116px;padding:10px 12px;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:linear-gradient(180deg,rgba(8,12,30,.78),rgba(8,12,30,.42));box-shadow:0 12px 38px rgba(0,0,0,.35);backdrop-filter:blur(14px)}
    .title{font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.62);text-transform:uppercase}.value{margin-top:4px;font-size:20px;font-weight:800}.mission{max-width:58vw;text-align:right}.mission .value{font-size:14px;line-height:1.35}.bar{height:7px;border-radius:999px;margin-top:8px;background:rgba(255,255,255,.14);overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--pink));box-shadow:0 0 18px var(--cyan)}
    .bottom{display:flex;align-items:flex-end;justify-content:space-between}.stick{pointer-events:auto;position:relative;width:128px;height:128px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);box-shadow:inset 0 0 35px rgba(41,243,255,.08)}.knob{position:absolute;left:44px;top:44px;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#fff,var(--cyan));box-shadow:0 0 25px rgba(41,243,255,.85)}
    .buttons{display:grid;grid-template-columns:76px 76px;gap:12px;pointer-events:auto}.btn{height:76px;border-radius:24px;border:1px solid rgba(255,255,255,.22);background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));color:white;font-size:12px;font-weight:800;letter-spacing:.08em;box-shadow:0 10px 35px rgba(0,0,0,.35);touch-action:none}.btn.primary{background:linear-gradient(180deg,rgba(255,59,212,.85),rgba(120,34,255,.45))}.btn.active{transform:translateY(2px);filter:brightness(1.25)}
    .dialog{position:fixed;left:14px;right:14px;bottom:calc(156px + env(safe-area-inset-bottom));padding:13px 15px;border-radius:20px;border:1px solid rgba(255,255,255,.16);background:rgba(5,7,17,.74);backdrop-filter:blur(16px);box-shadow:0 18px 50px rgba(0,0,0,.42);font-size:13px;line-height:1.55;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none}.dialog.show{opacity:1;transform:none}.speaker{color:var(--cyan);font-weight:800;letter-spacing:.12em;margin-right:.5em}.start{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,rgba(255,59,212,.17),rgba(5,7,17,.96) 55%),linear-gradient(180deg,rgba(0,0,0,.1),#050711);z-index:5;padding:24px}.panel{max-width:520px;width:100%;border:1px solid rgba(255,255,255,.18);border-radius:28px;background:rgba(7,9,20,.78);box-shadow:0 28px 90px rgba(0,0,0,.55);padding:24px;backdrop-filter:blur(18px)}h1{font-size:42px;line-height:.95;margin:0 0 10px;letter-spacing:-.05em}.lead{color:rgba(255,255,255,.75);line-height:1.65;margin:0 0 18px}.play{width:100%;height:58px;border:0;border-radius:18px;background:linear-gradient(90deg,var(--cyan),var(--pink));color:#05101a;font-weight:900;font-size:16px}.hint{font-size:12px;color:rgba(255,255,255,.55);margin-top:12px;line-height:1.5}@media (max-width:420px){.card{padding:9px 10px}.mission{max-width:55vw}.stick{width:116px;height:116px}.knob{left:38px;top:38px}.buttons{grid-template-columns:70px 70px}.btn{height:70px;border-radius:22px}h1{font-size:36px}}
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="top"><div class="card"><div class="title">Wanted</div><div class="value" id="wanted">0</div><div class="bar"><div id="heat" class="fill"></div></div></div><div class="card mission"><div class="title">Mission</div><div class="value" id="mission">西口地下搬入口へ向かえ</div></div></div>
  <div class="bottom"><div class="stick" id="stick"><div class="knob" id="knob"></div></div><div class="buttons"><button class="btn" id="dash">DASH<br>BRAKE</button><button class="btn primary" id="act">ACTION</button></div></div>
</div>
<div class="dialog show" id="dialog"><span class="speaker">REINA</span><span id="line">終電後の池袋は、雨音より監視ドローンの低周波が大きい。回線キーを回収して、東口まで抜けて。</span></div>
<div class="start" id="start"><div class="panel"><h1>RAIN//LINE<br>IKBUKURO</h1><p class="lead">雨の池袋を徒歩と車で駆け抜ける、iPhoneブラウザ用の短編オープンワールド風ナイトラン。架空の街区・人物・組織で構成しています。</p><button class="play" id="play">タップして開始</button><div class="hint">左スティック: 移動 / 右ACTION: 車に乗る・会話・回収 / DASH: 徒歩ダッシュ、車ではブレーキ。音は端末設定に従います。</div></div></div>
<script>
(()=>{const cvs=document.getElementById('game'),ctx=cvs.getContext('2d');let W=0,H=0,DPR=1;function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cvs.width=W*DPR;cvs.height=H*DPR;cvs.style.width=W+'px';cvs.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
const hud={wanted:document.getElementById('wanted'),heat:document.getElementById('heat'),mission:document.getElementById('mission'),dialog:document.getElementById('dialog'),line:document.getElementById('line'),start:document.getElementById('start')};
const input={x:0,y:0,dash:false,act:false};const stick=document.getElementById('stick'),knob=document.getElementById('knob');function bindStick(e){const r=stick.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,t=e.touches?e.touches[0]:e,dx=t.clientX-cx,dy=t.clientY-cy,m=Math.min(1,Math.hypot(dx,dy)/44),a=Math.atan2(dy,dx);input.x=Math.cos(a)*m;input.y=Math.sin(a)*m;knob.style.transform=`translate(${input.x*36}px,${input.y*36}px)`;e.preventDefault()}function clearStick(){input.x=input.y=0;knob.style.transform='translate(0,0)'}stick.addEventListener('touchstart',bindStick,{passive:false});stick.addEventListener('touchmove',bindStick,{passive:false});stick.addEventListener('touchend',clearStick);stick.addEventListener('pointerdown',e=>{stick.setPointerCapture(e.pointerId);bindStick(e)});stick.addEventListener('pointermove',e=>{if(e.pressure)bindStick(e)});stick.addEventListener('pointerup',clearStick);
for(const [id,key] of [['dash','dash'],['act','act']]){const b=document.getElementById(id);const on=e=>{input[key]=true;b.classList.add('active');e.preventDefault()};const off=()=>{input[key]=false;b.classList.remove('active')};b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off);b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointerleave',off)}
const world={w:2600,h:1900,camX:0,camY:0,time:0,started:false,mission:0,heat:0,messageT:6};const player={x:420,y:1260,a:-.35,spd:0,inCar:false,car:null};
const points=[{x:630,y:1160,n:'西口地下搬入口',m:'ACTIONで回線キーを回収'},{x:1430,y:1040,n:'ロマンス通り裏',m:'追跡を振り切り、路地の情報屋に接触'},{x:1970,y:760,n:'東口デッキ',m:'データをアップロードして街の照明を復旧'}];
const roads=[{x:0,y:880,w:2600,h:170},{x:0,y:1230,w:2600,h:210},{x:440,y:0,w:180,h:1900},{x:1180,y:0,w:230,h:1900},{x:1840,y:0,w:210,h:1900},{x:0,y:530,w:2600,h:145}];
const blocks=[{x:80,y:80,w:310,h:410,c:'#182138',s:'HOTEL'},{x:690,y:80,w:420,h:340,c:'#221632',s:'CINEMA'},{x:1490,y:80,w:300,h:400,c:'#14233a',s:'ARCADE'},{x:2090,y:100,w:360,h:360,c:'#25192d',s:'TOWER'},{x:90,y:650,w:300,h:190,c:'#112530',s:'RAMEN'},{x:710,y:670,w:360,h:170,c:'#2b1834',s:'KARAOKE'},{x:1480,y:665,w:300,h:170,c:'#12273b',s:'CAFE'},{x:2110,y:650,w:310,h:190,c:'#1f2034',s:'BOOKS'},{x:80,y:1490,w:340,h:300,c:'#161c34',s:'CLUB'},{x:720,y:1480,w:360,h:300,c:'#132b32',s:'MARKET'},{x:1490,y:1500,w:300,h:280,c:'#2a1730',s:'NEON'},{x:2100,y:1480,w:360,h:300,c:'#182438',s:'STATION'}];
function rnd(i){return (Math.sin(i*999.91)*43758.5453)%1}const cars=[],peds=[],rain=[];for(let i=0;i<18;i++){const r=roads[i%roads.length];cars.push({x:r.x+80+Math.abs(rnd(i))*Math.max(80,r.w-160),y:r.y+r.h*(.25+.5*Math.abs(rnd(i+9))),a:r.w>r.h?0:Math.PI/2,v:45+Math.abs(rnd(i+3))*55,police:i>13})}for(let i=0;i<70;i++)peds.push({x:120+Math.abs(rnd(i+20))*2360,y:100+Math.abs(rnd(i+30))*1700,a:rnd(i+2)*6.28,v:10+Math.abs(rnd(i+4))*16});for(let i=0;i<180;i++)rain.push({x:Math.random()*W,y:Math.random()*H,l:10+Math.random()*18,s:360+Math.random()*380});
function roadAt(x,y){return roads.some(r=>x>r.x&&x<r.x+r.w&&y>r.y&&y<r.y+r.h)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b,c,d){return Math.hypot(a-c,b-d)}function say(t){hud.line.textContent=t;hud.dialog.classList.add('show');world.messageT=5}
function action(){if(player.inCar){player.inCar=false;player.car.driver=false;player.x+=Math.cos(player.a+Math.PI/2)*38;player.y+=Math.sin(player.a+Math.PI/2)*38;return}let nearCar=cars.find(c=>dist(player.x,player.y,c.x,c.y)<64&&!c.police);if(nearCar){player.inCar=true;player.car=nearCar;nearCar.driver=true;say('KAI: 借りるだけだ。雨が上がる前に返す。');return}const p=points[world.mission];if(p&&dist(player.x,player.y,p.x,p.y)<88){world.mission++;world.heat+=world.mission===1?22:35;if(world.mission===1)say('REINA: キー確認。西口の監視が動いた。車を使ってもいい、ただし派手にやりすぎないで。');else if(world.mission===2)say('情報屋: 東口デッキの上、古い広告塔。そこが最後の中継点だ。');else say('REINA: 復旧完了。街の光が戻る。今夜の君は、記録に残らない。')}}document.getElementById('act').addEventListener('click',action);let lastAct=false;
function step(dt){world.time+=dt;if(input.act&&!lastAct)action();lastAct=input.act;const tx=input.x,ty=input.y,mag=Math.hypot(tx,ty);if(player.inCar){const c=player.car;if(mag>.05)c.a=Math.atan2(ty,tx);c.v=clamp(c.v+(mag*170-(input.dash?210:45))*dt,0,310);c.x+=Math.cos(c.a)*c.v*dt;c.y+=Math.sin(c.a)*c.v*dt;c.x=clamp(c.x,35,world.w-35);c.y=clamp(c.y,35,world.h-35);player.x=c.x;player.y=c.y;player.a=c.a;if(!roadAt(c.x,c.y))world.heat=Math.min(100,world.heat+10*dt)}else{if(mag>.05){player.a=Math.atan2(ty,tx);const sp=input.dash?190:118;player.x+=Math.cos(player.a)*sp*mag*dt;player.y+=Math.sin(player.a)*sp*mag*dt}player.x=clamp(player.x,30,world.w-30);player.y=clamp(player.y,30,world.h-30)}for(const c of cars){if(c.driver)continue;if(c.police&&world.heat>20){const a=Math.atan2(player.y-c.y,player.x-c.x);c.a+=(Math.atan2(Math.sin(a-c.a),Math.cos(a-c.a)))*dt*1.8;c.v=120+world.heat*1.1;if(dist(c.x,c.y,player.x,player.y)<75)world.heat=Math.min(100,world.heat+28*dt)}c.x+=Math.cos(c.a)*c.v*dt;c.y+=Math.sin(c.a)*c.v*dt;if(c.x<20||c.x>world.w-20||c.y<20||c.y>world.h-20)c.a+=Math.PI}for(const p of peds){p.x+=Math.cos(p.a)*p.v*dt;p.y+=Math.sin(p.a)*p.v*dt;if(!roadAt(p.x,p.y)||Math.random()<.006)p.a+=Math.PI*(.7+Math.random()*.6)}world.heat=Math.max(0,world.heat-(roadAt(player.x,player.y)?2.5:6)*dt);world.camX=clamp(player.x-W/2,0,world.w-W);world.camY=clamp(player.y-H/2,0,world.h-H);world.messageT-=dt;if(world.messageT<0)hud.dialog.classList.remove('show');hud.wanted.textContent=world.heat>66?'★★★':world.heat>34?'★★':'★'.repeat(world.heat>10?1:0)||'0';hud.heat.style.width=world.heat+'%';const p=points[world.mission];hud.mission.textContent=p?p.m:'完了 — 池袋の回線は復旧した'}
function drawBuilding(b){const x=b.x-world.camX,y=b.y-world.camY;ctx.fillStyle=b.c;ctx.fillRect(x,y,b.w,b.h);ctx.fillStyle='rgba(255,255,255,.08)';for(let yy=18;yy<b.h-14;yy+=34)for(let xx=18;xx<b.w-12;xx+=42){ctx.fillStyle=Math.random()<.18?'rgba(255,211,110,.75)':'rgba(80,140,180,.18)';ctx.fillRect(x+xx,y+yy,18,12)}ctx.save();ctx.translate(x+b.w/2,y+28);ctx.fillStyle=b.s==='NEON'?'#ff3bd4':'#29f3ff';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=16;ctx.font='bold 18px system-ui';ctx.textAlign='center';ctx.fillText(b.s,0,0);ctx.restore()}
function carShape(c){ctx.save();ctx.translate(c.x-world.camX,c.y-world.camY);ctx.rotate(c.a);ctx.fillStyle=c.police?'#dce8ff':'#101824';ctx.shadowColor=c.police?'#ff3b5f':'#29f3ff';ctx.shadowBlur=12;ctx.fillRect(-25,-13,50,26);ctx.fillStyle=c.police?'#173e8a':'#1ee7ff';ctx.fillRect(-10,-10,18,20);if(c.police){ctx.fillStyle=world.time%0.4<.2?'#ff214d':'#2cf5ff';ctx.fillRect(-3,-17,10,5)}ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(14,-10,4,5);ctx.fillRect(14,5,4,5);ctx.restore()}
function draw(){ctx.clearRect(0,0,W,H);const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#091227');g.addColorStop(1,'#060710');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.save();ctx.translate(-world.camX,-world.camY);ctx.fillStyle='#0b0f19';ctx.fillRect(0,0,world.w,world.h);for(const r of roads){ctx.fillStyle='#141b25';ctx.fillRect(r.x,r.y,r.w,r.h);ctx.fillStyle='rgba(255,255,255,.13)';if(r.w>r.h){for(let x=r.x;x<r.x+r.w;x+=90)ctx.fillRect(x,r.y+r.h/2-2,46,4)}else{for(let y=r.y;y<r.y+r.h;y+=90)ctx.fillRect(r.x+r.w/2-2,y,4,46)}}ctx.restore();blocks.forEach(drawBuilding);ctx.save();ctx.globalCompositeOperation='lighter';for(let i=0;i<28;i++){const x=((i*173+world.time*25)%world.w)-world.camX,y=((i*97)%world.h)-world.camY;ctx.fillStyle=i%2?'rgba(255,59,212,.26)':'rgba(41,243,255,.25)';ctx.beginPath();ctx.arc(x,y,90+20*Math.sin(world.time+i),0,6.28);ctx.fill()}ctx.restore();for(const p of peds){const x=p.x-world.camX,y=p.y-world.camY;if(x<-20||y<-20||x>W+20||y>H+20)continue;ctx.save();ctx.translate(x,y);ctx.rotate(p.a);ctx.fillStyle='rgba(20,20,28,.85)';ctx.fillRect(-3,-8,6,16);ctx.fillStyle='#f0c6a2';ctx.beginPath();ctx.arc(0,-11,4,0,6.28);ctx.fill();ctx.restore()}cars.forEach(c=>{if(c.x-world.camX>-60&&c.x-world.camX<W+60&&c.y-world.camY>-60&&c.y-world.camY<H+60)carShape(c)});ctx.save();ctx.translate(player.x-world.camX,player.y-world.camY);ctx.rotate(player.a);if(!player.inCar){ctx.shadowColor='#29f3ff';ctx.shadowBlur=18;ctx.fillStyle='#10131d';ctx.fillRect(-7,-12,14,24);ctx.fillStyle='#f2c39e';ctx.beginPath();ctx.arc(0,-16,6,0,6.28);ctx.fill();ctx.fillStyle='#38e8ff';ctx.fillRect(4,-4,8,3)}ctx.restore();const p=points[world.mission];if(p){const x=p.x-world.camX,y=p.y-world.camY;ctx.save();ctx.translate(x,y);ctx.strokeStyle='#ffd36e';ctx.lineWidth=3;ctx.shadowColor='#ffd36e';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(0,0,26+Math.sin(world.time*4)*5,0,6.28);ctx.stroke();ctx.fillStyle='#ffd36e';ctx.font='bold 12px system-ui';ctx.textAlign='center';ctx.fillText(p.n,0,-36);ctx.restore()}ctx.save();ctx.globalCompositeOperation='screen';ctx.strokeStyle='rgba(180,220,255,.35)';ctx.lineWidth=1;for(const r of rain){r.x-=110/60;r.y+=r.s/60;if(r.y>H+30){r.y=-30;r.x=Math.random()*W}if(r.x<-30)r.x=W+30;ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-8,r.y+r.l);ctx.stroke()}ctx.restore();ctx.fillStyle='rgba(4,7,16,.25)';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.08)';ctx.font='11px system-ui';ctx.fillText('RAIN//LINE IKB / fictitious Ikebukuro noir prototype',12,H-8)}
let last=performance.now();function loop(t){const dt=Math.min(.033,(t-last)/1000);last=t;if(world.started)step(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);document.getElementById('play').onclick=()=>{world.started=true;hud.start.style.display='none';say('REINA: まず西口地下搬入口。黄色いリングが見える場所まで移動してACTION。')};addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')input.x=-1;if(e.key==='ArrowRight'||e.key==='d')input.x=1;if(e.key==='ArrowUp'||e.key==='w')input.y=-1;if(e.key==='ArrowDown'||e.key==='s')input.y=1;if(e.key===' ')input.dash=true;if(e.key==='e')input.act=true});addEventListener('keyup',e=>{if(['ArrowLeft','a','ArrowRight','d'].includes(e.key))input.x=0;if(['ArrowUp','w','ArrowDown','s'].includes(e.key))input.y=0;if(e.key===' ')input.dash=false;if(e.key==='e')input.act=false});})();
</script>
</body>
</html>
