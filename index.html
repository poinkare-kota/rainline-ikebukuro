<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#050711" />
  <title>RAIN//LINE IKB 3D</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050711;color:white;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;touch-action:none;user-select:none}#view{position:fixed;inset:0;width:100vw;height:100dvh}.hud{position:fixed;inset:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);padding:14px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}.top{display:flex;justify-content:space-between;gap:10px}.card{padding:10px 12px;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(6,9,22,.68);backdrop-filter:blur(14px);box-shadow:0 14px 40px rgba(0,0,0,.36)}.label{font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.62)}.value{font-weight:800;margin-top:4px}.mission{max-width:58vw;text-align:right;font-size:13px;line-height:1.35}.bar{height:7px;background:rgba(255,255,255,.14);border-radius:99px;overflow:hidden;margin-top:7px}.fill{height:100%;width:0;background:linear-gradient(90deg,#29f3ff,#ff3bd4)}.bottom{display:flex;justify-content:space-between;align-items:flex-end}.stick{pointer-events:auto;width:126px;height:126px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);position:relative}.knob{position:absolute;left:43px;top:43px;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#fff,#29f3ff);box-shadow:0 0 24px #29f3ff}.buttons{pointer-events:auto;display:grid;grid-template-columns:75px 75px;gap:12px}.btn{height:75px;border-radius:24px;border:1px solid rgba(255,255,255,.24);background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.07));color:#fff;font-weight:900;font-size:12px;letter-spacing:.05em}.btn.main{background:linear-gradient(180deg,rgba(255,59,212,.9),rgba(92,44,255,.5))}.dialog{position:fixed;left:14px;right:14px;bottom:calc(154px + env(safe-area-inset-bottom));padding:13px 15px;border:1px solid rgba(255,255,255,.15);border-radius:20px;background:rgba(5,7,17,.72);backdrop-filter:blur(16px);font-size:13px;line-height:1.55;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none}.dialog.show{opacity:1;transform:none}.speaker{font-weight:900;color:#29f3ff;letter-spacing:.12em}.start{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,rgba(255,59,212,.18),rgba(5,7,17,.96) 56%);z-index:4;padding:24px}.panel{max-width:540px;border:1px solid rgba(255,255,255,.18);border-radius:28px;background:rgba(6,9,22,.76);backdrop-filter:blur(18px);padding:24px;box-shadow:0 28px 90px rgba(0,0,0,.55)}h1{font-size:42px;line-height:.95;letter-spacing:-.05em;margin:0 0 10px}.lead{color:rgba(255,255,255,.72);line-height:1.65}.play{width:100%;height:58px;border:0;border-radius:18px;background:linear-gradient(90deg,#29f3ff,#ff3bd4);color:#05101a;font-size:16px;font-weight:950}.note{font-size:12px;color:rgba(255,255,255,.55);line-height:1.5;margin-top:12px}@media(max-width:420px){.stick{width:114px;height:114px}.knob{left:37px;top:37px}.buttons{grid-template-columns:69px 69px}.btn{height:69px}.mission{max-width:54vw}h1{font-size:36px}}
  </style>
</head>
<body>
<canvas id="view"></canvas>
<div class="hud"><div class="top"><div class="card"><div class="label">WANTED</div><div class="value" id="wanted">0</div><div class="bar"><div class="fill" id="heat"></div></div></div><div class="card mission"><div class="label">MISSION</div><div class="value" id="mission">西口搬入口へ向かえ</div></div></div><div class="bottom"><div class="stick" id="stick"><div class="knob" id="knob"></div></div><div class="buttons"><button class="btn" id="dash">RUN<br>BRAKE</button><button class="btn main" id="act">ACTION</button></div></div></div>
<div class="dialog show" id="dialog"><span class="speaker">REINA</span> <span id="line">3D版に切り替えた。雨の西口から始める。黄色い光柱まで移動して。</span></div>
<div class="start" id="start"><div class="panel"><h1>RAIN//LINE<br>IKBUKURO 3D</h1><p class="lead">WebGLで動く3Dナイトラン。建物、道路、車両、雨、ネオン照明はコード生成。買い素材なしで、iPhoneブラウザ向けに軽量化しています。</p><button id="play" class="play">タップして3Dで開始</button><div class="note">左スティック: 移動 / ACTION: 車に乗る・降りる・回収 / RUN/BRAKE: 徒歩ダッシュ・車ブレーキ</div></div></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';
const canvas=document.getElementById('view');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.18;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x050711);scene.fog=new THREE.FogExp2(0x071020,.012);
const camera=new THREE.PerspectiveCamera(64,innerWidth/innerHeight,.1,1300);const clock=new THREE.Clock();
function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();
const ui={wanted:document.getElementById('wanted'),heat:document.getElementById('heat'),mission:document.getElementById('mission'),dialog:document.getElementById('dialog'),line:document.getElementById('line')};
function say(t){ui.line.textContent=t;ui.dialog.classList.add('show');state.msg=5}
const state={started:false,mission:0,heat:0,msg:7,time:0};const input={x:0,y:0,dash:false,act:false};
const amb=new THREE.HemisphereLight(0x344d7a,0x050507,.55);scene.add(amb);const moon=new THREE.DirectionalLight(0xaecbff,1.1);moon.position.set(-90,160,40);moon.castShadow=true;moon.shadow.mapSize.set(1024,1024);scene.add(moon);
function mat(c,rough=.6,metal=.1){return new THREE.MeshStandardMaterial({color:c,roughness:rough,metalness:metal})}const asphalt=mat(0x101722,.42,.05),sidewalk=mat(0x202635,.7,.02),glass=mat(0x101a2c,.28,.4),black=mat(0x080a10,.55,.2),skin=mat(0xd6a47e,.55,0),coat=mat(0x111827,.7,0),cyan=mat(0x31f4ff,.25,.2),pink=mat(0xff3bd4,.25,.2),yellow=mat(0xffd36e,.25,.1);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(1200,1200),mat(0x090d15,.82,0));ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
const roads=[];function addRoad(x,z,w,d){const r=new THREE.Mesh(new THREE.BoxGeometry(w,.08,d),asphalt);r.position.set(x,.02,z);r.receiveShadow=true;scene.add(r);roads.push({x,z,w,d});const line=new THREE.Mesh(new THREE.BoxGeometry(w>d?w*.9:.08,.09,w>d?.12:d*.9),mat(0xdfe7ff,.5,0));line.position.set(x,.08,z);scene.add(line)}
[-250,0,260].forEach(z=>addRoad(0,z,1150,54));[-360,-80,210,470].forEach(x=>addRoad(x,0,54,1150));
function roadAt(x,z){return roads.some(r=>Math.abs(x-r.x)<r.w/2&&Math.abs(z-r.z)<r.d/2)}
function neonText(txt,x,y,z,c){const cvs=document.createElement('canvas');cvs.width=512;cvs.height=128;const g=cvs.getContext('2d');g.fillStyle='transparent';g.fillRect(0,0,512,128);g.font='900 54px system-ui';g.textAlign='center';g.textBaseline='middle';g.shadowColor=c;g.shadowBlur=20;g.fillStyle=c;g.fillText(txt,256,64);const tex=new THREE.CanvasTexture(cvs);tex.colorSpace=THREE.SRGBColorSpace;const m=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false});const s=new THREE.Mesh(new THREE.PlaneGeometry(44,11),m);s.position.set(x,y,z);scene.add(s);return s}
const signs=[];function addBuilding(x,z,w,d,h,name,color){const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(color,.55,.18));b.position.set(x,h/2,z);b.castShadow=b.receiveShadow=true;scene.add(b);const rows=Math.max(2,Math.floor(h/9));for(let i=0;i<rows;i++){for(let j=0;j<Math.floor(w/10);j++){if(Math.random()<.55)continue;const win=new THREE.Mesh(new THREE.PlaneGeometry(4,2.3),new THREE.MeshBasicMaterial({color:Math.random()<.5?0xffc46e:0x55dfff}));win.position.set(x-w/2+7+j*9,5+i*8,z+d/2+.06);scene.add(win)}}const s=neonText(name,x,h+5,z+d/2+.2,Math.random()<.5?'#29f3ff':'#ff3bd4');signs.push(s)}
const names=['HOTEL','ARCADE','RAMEN','CINEMA','BOOKS','CLUB','CAFE','METRO','TOWER','KARAOKE','MARKET','NOIR'];let ni=0;for(let x=-520;x<=520;x+=120){for(let z=-520;z<=520;z+=120){if(roadAt(x,z)||Math.random()<.18)continue;addBuilding(x,z,62+Math.random()*28,62+Math.random()*28,38+Math.random()*95,names[ni++%names.length],new THREE.Color().setHSL(.58+Math.random()*.18,.28,.12+Math.random()*.08).getHex())}}
const playerGroup=new THREE.Group();scene.add(playerGroup);const body=new THREE.Mesh(new THREE.CapsuleGeometry(3.2,10,8,16),coat);body.position.y=9;body.castShadow=true;playerGroup.add(body);const head=new THREE.Mesh(new THREE.SphereGeometry(3.2,16,12),skin);head.position.y=16.8;head.castShadow=true;playerGroup.add(head);const phone=new THREE.Mesh(new THREE.BoxGeometry(1.2,2.2,.25),cyan);phone.position.set(3.5,10,1.6);playerGroup.add(phone);playerGroup.position.set(-410,0,260);
function makeCar(color=0x111827,police=false){const g=new THREE.Group();const base=new THREE.Mesh(new THREE.BoxGeometry(18,5,35),mat(color,.34,.45));base.position.y=3;base.castShadow=true;g.add(base);const top=new THREE.Mesh(new THREE.BoxGeometry(13,5,15),glass);top.position.set(0,7,-2);top.castShadow=true;g.add(top);for(const x of [-7,7])for(const z of [-12,12]){const wh=new THREE.Mesh(new THREE.CylinderGeometry(2.4,2.4,2.4,18),black);wh.rotation.z=Math.PI/2;wh.position.set(x,2,z);g.add(wh)}const l=new THREE.PointLight(police?0xff3355:0x6df7ff,police?2.8:1.5,70);l.position.set(0,8,-14);g.add(l);if(police){const bar=new THREE.Mesh(new THREE.BoxGeometry(10,1.2,2.5),pink);bar.position.set(0,10,-3);g.add(bar)}g.userData={speed:0,police,driver:false,angle:0};scene.add(g);return g}
const cars=[];for(let i=0;i<18;i++){const c=makeCar(i>13?0xd8e6ff:[0x171c28,0x263448,0x34172f,0x10252d][i%4],i>13);const r=roads[i%roads.length];c.position.set(r.x+(Math.random()-.5)*r.w,0,r.z+(Math.random()-.5)*r.d);c.userData.angle=r.w>r.d?Math.PI/2:0;c.rotation.y=c.userData.angle;c.userData.speed=16+Math.random()*26;cars.push(c)}let inCar=null;
const peds=[];for(let i=0;i<55;i++){const p=new THREE.Mesh(new THREE.CapsuleGeometry(1.6,5,5,8),mat(Math.random()<.5?0x0e1320:0x26142a,.75,0));p.position.set(-520+Math.random()*1040,3.6,-520+Math.random()*1040);p.userData={a:Math.random()*Math.PI*2,v:3+Math.random()*3};p.castShadow=true;scene.add(p);peds.push(p)}
const rainGeo=new THREE.BufferGeometry(),rainCount=900,pos=new Float32Array(rainCount*3);for(let i=0;i<rainCount;i++){pos[i*3]=(Math.random()-.5)*900;pos[i*3+1]=Math.random()*180+15;pos[i*3+2]=(Math.random()-.5)*900}rainGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));const rain=new THREE.Points(rainGeo,new THREE.PointsMaterial({color:0xb7d8ff,size:.75,transparent:true,opacity:.55}));scene.add(rain);
const goals=[{p:new THREE.Vector3(-300,0,240),m:'西口搬入口でACTION: 回線キー回収',s:'REINA: キー確認。警備車両が動いた。車を使って東側へ。'},{p:new THREE.Vector3(100,0,-30),m:'ロマンス通り裏で情報屋に接触',s:'情報屋: 東口デッキの広告塔だ。雨が強い、尾行を切れ。'},{p:new THREE.Vector3(420,0,-260),m:'東口デッキでアップロード',s:'REINA: 復旧完了。ネオンが戻った。今夜の記録は消しておく。'}];const marker=new THREE.Group();scene.add(marker);const ring=new THREE.Mesh(new THREE.TorusGeometry(12,.7,12,48),yellow);ring.rotation.x=Math.PI/2;marker.add(ring);const beam=new THREE.PointLight(0xffd36e,3,90);beam.position.y=18;marker.add(beam);
function bindButton(id,k){const b=document.getElementById(id);const on=e=>{input[k]=true;e.preventDefault()};const off=()=>input[k]=false;b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off);b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointerleave',off)}bindButton('dash','dash');bindButton('act','act');
const stick=document.getElementById('stick'),knob=document.getElementById('knob');function stickMove(e){const r=stick.getBoundingClientRect(),t=e.touches?e.touches[0]:e,cx=r.left+r.width/2,cy=r.top+r.height/2,dx=t.clientX-cx,dy=t.clientY-cy,a=Math.atan2(dy,dx),m=Math.min(1,Math.hypot(dx,dy)/44);input.x=Math.cos(a)*m;input.y=Math.sin(a)*m;knob.style.transform=`translate(${input.x*36}px,${input.y*36}px)`;e.preventDefault()}function stickEnd(){input.x=input.y=0;knob.style.transform='translate(0,0)'}stick.addEventListener('touchstart',stickMove,{passive:false});stick.addEventListener('touchmove',stickMove,{passive:false});stick.addEventListener('touchend',stickEnd);stick.addEventListener('pointerdown',e=>{stick.setPointerCapture(e.pointerId);stickMove(e)});stick.addEventListener('pointermove',e=>{if(e.buttons)stickMove(e)});stick.addEventListener('pointerup',stickEnd);
function action(){const me=inCar||playerGroup;if(inCar){playerGroup.position.copy(inCar.position).add(new THREE.Vector3(12,0,0));inCar.userData.driver=false;inCar=null;playerGroup.visible=true;say('KAI: 降りる。足音は雨で消える。');return}const near=cars.find(c=>!c.userData.police&&c.position.distanceTo(playerGroup.position)<25);if(near){inCar=near;near.userData.driver=true;playerGroup.visible=false;say('KAI: 車両確保。視界は悪いが、行ける。');return}const g=goals[state.mission];if(g&&me.position.distanceTo(g.p)<30){state.mission++;state.heat=Math.min(100,state.heat+28);say(g.s)}}let prevAct=false;
function update(dt){state.time+=dt;if(input.act&&!prevAct)action();prevAct=input.act;const target=inCar||playerGroup;const mag=Math.hypot(input.x,input.y);if(inCar){if(mag>.05)inCar.userData.angle=Math.atan2(input.x,input.y);inCar.userData.speed=THREE.MathUtils.clamp(inCar.userData.speed+(mag*80-(input.dash?90:20))*dt,0,92);inCar.rotation.y=inCar.userData.angle;inCar.position.x+=Math.sin(inCar.userData.angle)*inCar.userData.speed*dt;inCar.position.z+=Math.cos(inCar.userData.angle)*inCar.userData.speed*dt;playerGroup.position.copy(inCar.position);if(!roadAt(inCar.position.x,inCar.position.z))state.heat+=8*dt}else if(mag>.05){const a=Math.atan2(input.x,input.y);playerGroup.rotation.y=a;const sp=input.dash?44:27;playerGroup.position.x+=Math.sin(a)*sp*mag*dt;playerGroup.position.z+=Math.cos(a)*sp*mag*dt}target.position.x=THREE.MathUtils.clamp(target.position.x,-560,560);target.position.z=THREE.MathUtils.clamp(target.position.z,-560,560);
for(const c of cars){if(c===inCar)continue;if(c.userData.police&&state.heat>15){const dx=target.position.x-c.position.x,dz=target.position.z-c.position.z;const a=Math.atan2(dx,dz);c.userData.angle=THREE.MathUtils.lerp(c.userData.angle,a,dt*1.6);c.userData.speed=38+state.heat*.45;if(c.position.distanceTo(target.position)<28)state.heat=Math.min(100,state.heat+30*dt)}c.rotation.y=c.userData.angle;c.position.x+=Math.sin(c.userData.angle)*c.userData.speed*dt;c.position.z+=Math.cos(c.userData.angle)*c.userData.speed*dt;if(Math.abs(c.position.x)>570||Math.abs(c.position.z)>570)c.userData.angle+=Math.PI}
for(const p of peds){p.position.x+=Math.sin(p.userData.a)*p.userData.v*dt;p.position.z+=Math.cos(p.userData.a)*p.userData.v*dt;p.rotation.y=p.userData.a;if(!roadAt(p.position.x,p.position.z)||Math.random()<.01)p.userData.a+=Math.PI*(.7+Math.random()*.6)}
const rp=rain.geometry.attributes.position.array;for(let i=0;i<rainCount;i++){rp[i*3+1]-=130*dt;if(rp[i*3+1]<0){rp[i*3+1]=170;rp[i*3]=target.position.x+(Math.random()-.5)*900;rp[i*3+2]=target.position.z+(Math.random()-.5)*900}}rain.geometry.attributes.position.needsUpdate=true;rain.position.x=0;rain.position.z=0;
const g=goals[state.mission];if(g){marker.visible=true;marker.position.copy(g.p);marker.position.y=1;ring.rotation.z+=dt*2.2;ui.mission.textContent=g.m}else{marker.visible=false;ui.mission.textContent='完了 — 池袋の回線は復旧した'}state.heat=Math.max(0,state.heat-(roadAt(target.position.x,target.position.z)?2.5:5)*dt);ui.heat.style.width=state.heat+'%';ui.wanted.textContent=state.heat>70?'★★★':state.heat>38?'★★':state.heat>10?'★':'0';state.msg-=dt;if(state.msg<0)ui.dialog.classList.remove('show');
const back=new THREE.Vector3(Math.sin(target.rotation.y||0)*-52,34,Math.cos(target.rotation.y||0)*-52);if(inCar)back.set(Math.sin(inCar.userData.angle)*-78,42,Math.cos(inCar.userData.angle)*-78);const camPos=target.position.clone().add(back);camera.position.lerp(camPos,1-Math.pow(.001,dt));camera.lookAt(target.position.x,10,target.position.z)}
function animate(){const dt=Math.min(.033,clock.getDelta());if(state.started)update(dt);for(const s of signs)s.lookAt(camera.position.x,s.position.y,camera.position.z);renderer.render(scene,camera);requestAnimationFrame(animate)}animate();
document.getElementById('play').onclick=()=>{state.started=true;document.getElementById('start').style.display='none';say('REINA: 3D版起動。黄色い光柱まで移動してACTION。')};addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')input.x=-1;if(e.key==='d'||e.key==='ArrowRight')input.x=1;if(e.key==='w'||e.key==='ArrowUp')input.y=1;if(e.key==='s'||e.key==='ArrowDown')input.y=-1;if(e.key===' ')input.dash=true;if(e.key==='e')input.act=true});addEventListener('keyup',e=>{if(['a','d','ArrowLeft','ArrowRight'].includes(e.key))input.x=0;if(['w','s','ArrowUp','ArrowDown'].includes(e.key))input.y=0;if(e.key===' ')input.dash=false;if(e.key==='e')input.act=false});
</script>
</body>
</html>
