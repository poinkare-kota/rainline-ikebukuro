<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>RAIN//LINE IKB 3D</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#050711;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;touch-action:none}#c{width:100vw;height:100dvh;display:block}.ui{position:fixed;inset:0;padding:14px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}.top{display:flex;justify-content:space-between}.box{background:rgba(5,8,20,.7);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)}.small{font-size:11px;color:#9fb;letter-spacing:.14em}.bottom{display:flex;justify-content:space-between;align-items:flex-end}.stick{pointer-events:auto;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);position:relative}.knob{position:absolute;left:40px;top:40px;width:40px;height:40px;border-radius:50%;background:#29f3ff;box-shadow:0 0 24px #29f3ff}.btns{pointer-events:auto;display:grid;grid-template-columns:72px 72px;gap:12px}.btn{height:72px;border-radius:22px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:white;font-weight:900}.main{background:linear-gradient(180deg,#ff3bd4,#5b2cff)}.start{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,rgba(255,59,212,.2),rgba(5,7,17,.96) 55%);padding:24px}.panel{max-width:520px;padding:24px;border-radius:28px;background:rgba(8,10,25,.78);border:1px solid rgba(255,255,255,.18)}h1{font-size:42px;line-height:.95;margin:0 0 10px}.play{width:100%;height:58px;border:0;border-radius:18px;background:linear-gradient(90deg,#29f3ff,#ff3bd4);font-weight:950}</style></head><body><canvas id="c"></canvas><div class="ui"><div class="top"><div class="box"><div class="small">RAIN//LINE</div><b>3D WEBGL</b></div><div class="box" id="m">黄色い光柱へ向かえ</div></div><div class="bottom"><div class="stick" id="s"><div class="knob" id="k"></div></div><div class="btns"><button class="btn" id="b">RUN<br>BRAKE</button><button class="btn main" id="a">ACTION</button></div></div></div><div class="start" id="st"><div class="panel"><h1>RAIN//LINE<br>IKBUKURO 3D</h1><p>買い素材なし。WebGLで生成した池袋風ナイトシティ、車、雨、ネオン、追跡。</p><button class="play" id="p">開始</button></div></div><script type="module">import*as T from'https://unpkg.com/three@0.165.0/build/three.module.js';let W=innerWidth,H=innerHeight,run=false,car=null,heat=0,act=false;const cv=document.getElementById('c'),r=new T.WebGLRenderer({canvas:cv,antialias:true});r.setPixelRatio(Math.min(devicePixelRatio,2));r.shadowMap.enabled=true;const sc=new T.Scene();sc.background=new T.Color(0x050711);sc.fog=new T.FogExp2(0x071020,.012);const ca=new T.PerspectiveCamera(65,W/H,.1,1200);function rs(){W=innerWidth;H=innerHeight;r.setSize(W,H,false);ca.aspect=W/H;ca.updateProjectionMatrix()}addEventListener('resize',rs);rs();sc.add(new T.HemisphereLight(0x445577,0x050505,.7));const sun=new T.DirectionalLight(0xb8ccff,1.3);sun.position.set(-80,150,60);sun.castShadow=true;sc.add(sun);const mat=(c,ro=.55,me=.08)=>new T.MeshStandardMaterial({color:c,roughness:ro,metalness:me});const road=mat(0x111824,.4),dark=mat(0x0d1220),skin=mat(0xd8a57b),pink=mat(0xff3bd4,.2,.2),cyan=mat(0x29f3ff,.2,.2);const g=new T.Mesh(new T.PlaneGeometry(1200,1200),mat(0x080c14,.8));g.rotation.x=-Math.PI/2;g.receiveShadow=true;sc.add(g);const roads=[];function rd(x,z,w,d){let m=new T.Mesh(new T.BoxGeometry(w,.1,d),road);m.position.set(x,.02,z);m.receiveShadow=true;sc.add(m);roads.push({x,z,w,d})}[-280,0,260].forEach(z=>rd(0,z,1150,55));[-430,-120,180,470].forEach(x=>rd(x,0,55,1150));const onRoad=(x,z)=>roads.some(o=>Math.abs(x-o.x)<o.w/2&&Math.abs(z-o.z)<o.d/2);function sign(t,x,y,z,c){let cn=document.createElement('canvas');cn.width=512;cn.height=128;let q=cn.getContext('2d');q.font='900 56px system-ui';q.textAlign='center';q.textBaseline='middle';q.shadowColor=c;q.shadowBlur=24;q.fillStyle=c;q.fillText(t,256,64);let tx=new T.CanvasTexture(cn),s=new T.Mesh(new T.PlaneGeometry(45,12),new T.MeshBasicMaterial({map:tx,transparent:true}));s.position.set(x,y,z);sc.add(s);return s}let signs=[],names=['HOTEL','ARCADE','RAMEN','CINEMA','CLUB','METRO','BOOKS','NOIR'];for(let x=-520;x<=520;x+=125)for(let z=-520;z<=520;z+=125){if(onRoad(x,z)||Math.random()<.2)continue;let h=40+Math.random()*100,b=new T.Mesh(new T.BoxGeometry(70, h,70),mat(new T.Color().setHSL(.58+Math.random()*.18,.3,.12).getHex(),.5,.2));b.position.set(x,h/2,z);b.castShadow=b.receiveShadow=true;sc.add(b);signs.push(sign(names[signs.length%names.length],x,h+6,z+36,Math.random()<.5?'#29f3ff':'#ff3bd4'))}const pl=new T.Group();sc.add(pl);let body=new T.Mesh(new T.CapsuleGeometry(3,10,8,16),dark);body.position.y=9;body.castShadow=true;pl.add(body);let head=new T.Mesh(new T.SphereGeometry(3,16,12),skin);head.position.y=17;head.castShadow=true;pl.add(head);pl.position.set(-400,0,250);function mkcar(pol=false){let c=new T.Group(),base=new T.Mesh(new T.BoxGeometry(18,5,34),mat(pol?0xdfe8ff:0x182032,.35,.4));base.position.y=3;base.castShadow=true;c.add(base);let top=new T.Mesh(new T.BoxGeometry(12,5,14),mat(0x122034,.25,.5));top.position.set(0,7,-2);c.add(top);let l=new T.PointLight(pol?0xff3355:0x44eeff,pol?3:1.4,70);l.position.set(0,8,-14);c.add(l);if(pol){let bar=new T.Mesh(new T.BoxGeometry(10,1,2),pink);bar.position.set(0,10,-4);c.add(bar)}c.userData={a:0,v:18+Math.random()*20,pol};sc.add(c);return c}let cars=[];for(let i=0;i<16;i++){let c=mkcar(i>12),o=roads[i%roads.length];c.position.set(o.x+(Math.random()-.5)*o.w,0,o.z+(Math.random()-.5)*o.d);c.userData.a=o.w>o.d?Math.PI/2:0;cars.push(c)}let goal=new T.Vector3(-300,0,240),marker=new T.PointLight(0xffd36e,5,120);marker.position.copy(goal).setY(25);sc.add(marker);let ring=new T.Mesh(new T.TorusGeometry(14,.8,12,64),mat(0xffd36e,.2));ring.rotation.x=Math.PI/2;ring.position.copy(goal).setY(1);sc.add(ring);let rainGeo=new T.BufferGeometry(),cnt=700,pos=new Float32Array(cnt*3);for(let i=0;i<cnt;i++){pos[i*3]=(Math.random()-.5)*800;pos[i*3+1]=Math.random()*180;pos[i*3+2]=(Math.random()-.5)*800}rainGeo.setAttribute('position',new T.BufferAttribute(pos,3));let rain=new T.Points(rainGeo,new T.PointsMaterial({color:0xb8d8ff,size:.7,opacity:.55,transparent:true}));sc.add(rain);const inp={x:0,y:0,br:false};function joy(e){let rc=s.getBoundingClientRect(),t=e.touches?e.touches[0]:e,dx=t.clientX-(rc.left+rc.width/2),dy=t.clientY-(rc.top+rc.height/2),a=Math.atan2(dy,dx),m=Math.min(1,Math.hypot(dx,dy)/44);inp.x=Math.cos(a)*m;inp.y=Math.sin(a)*m;k.style.transform=`translate(${inp.x*35}px,${inp.y*35}px)`;e.preventDefault()}s.ontouchstart=s.ontouchmove=joy;s.ontouchend=()=>{inp.x=inp.y=0;k.style.transform=''};b.ontouchstart=e=>{inp.br=true;e.preventDefault()};b.ontouchend=()=>inp.br=false;a.ontouchstart=e=>{act=true;e.preventDefault()};a.ontouchend=()=>act=false;p.onclick=()=>{run=true;st.style.display='none'};function action(){let target=car||pl;if(car){pl.visible=true;pl.position.copy(car.position).add(new T.Vector3(12,0,0));car=null;return}let n=cars.find(c=>!c.userData.pol&&c.position.distanceTo(pl.position)<28);if(n){car=n;pl.visible=false;return}if(target.position.distanceTo(goal)<35){goal.set(420,0,-260);marker.position.copy(goal).setY(25);ring.position.copy(goal).setY(1);m.textContent='東口デッキへ逃げろ';heat=70}}let pa=false,last=performance.now();function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;if(run){if(act&&!pa)action();pa=act;let target=car||pl,mag=Math.hypot(inp.x,inp.y);if(car){if(mag>.05)car.userData.a=Math.atan2(inp.x,inp.y);car.userData.v=Math.max(0,Math.min(95,car.userData.v+(mag*80-(inp.br?90:20))*dt));car.rotation.y=car.userData.a;car.position.x+=Math.sin(car.userData.a)*car.userData.v*dt;car.position.z+=Math.cos(car.userData.a)*car.userData.v*dt;pl.position.copy(car.position)}else if(mag>.05){let aa=Math.atan2(inp.x,inp.y);pl.rotation.y=aa;pl.position.x+=Math.sin(aa)*(inp.br?48:28)*mag*dt;pl.position.z+=Math.cos(aa)*(inp.br?48:28)*mag*dt}for(let c of cars){if(c===car)continue;if(c.userData.pol&&heat>20){let aa=Math.atan2(target.position.x-c.position.x,target.position.z-c.position.z);c.userData.a+=Math.atan2(Math.sin(aa-c.userData.a),Math.cos(aa-c.userData.a))*dt*1.7;c.userData.v=45}c.rotation.y=c.userData.a;c.position.x+=Math.sin(c.userData.a)*c.userData.v*dt;c.position.z+=Math.cos(c.userData.a)*c.userData.v*dt;if(Math.abs(c.position.x)>570||Math.abs(c.position.z)>570)c.userData.a+=Math.PI}let arr=rain.geometry.attributes.position.array;for(let i=0;i<cnt;i++){arr[i*3+1]-=120*dt;if(arr[i*3+1]<0){arr[i*3]=target.position.x+(Math.random()-.5)*800;arr[i*3+1]=160;arr[i*3+2]=target.position.z+(Math.random()-.5)*800}}rain.geometry.attributes.position.needsUpdate=true;ring.rotation.z+=dt*2;let back=car?new T.Vector3(Math.sin(car.userData.a)*-78,42,Math.cos(car.userData.a)*-78):new T.Vector3(Math.sin(pl.rotation.y)*-55,34,Math.cos(pl.rotation.y)*-55);ca.position.lerp(target.position.clone().add(back),1-Math.pow(.001,dt));ca.lookAt(target.position.x,12,target.position.z);heat=Math.max(0,heat-dt*3)}for(let sgn of signs)sgn.lookAt(ca.position.x,sgn.position.y,ca.position.z);r.render(sc,ca);requestAnimationFrame(loop)}loop(last);</script></body></html>
